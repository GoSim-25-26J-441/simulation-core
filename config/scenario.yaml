metadata:
  schema_version: "0.2.0"

simulation_limits:
  max_trace_depth: 48
  max_async_hops: 12

# Batch optimizer topology controls (BatchOptimizationConfig) now support:
# - min_locality_hit_rate
# - max_cross_zone_request_fraction
# - max_topology_latency_penalty_mean_ms
# and penalty_weights:
# - locality
# - cross_zone
# - topology_latency
# Online optimizer topology guardrails (OptimizationConfig) also support:
# - min_locality_hit_rate
# - max_cross_zone_request_fraction
# - max_topology_latency_penalty_mean_ms
# Online guard decisions are emitted as no-op optimization_history entries with
# reason strings prefixed by topology_guard_blocked. If locality routing exists
# and locality_hit_rate is 0, the controller treats it as an all-miss violation.
# These are API/optimizer settings (not scenario fields), listed here for quick reference.

# Optional topology/network overlays for research runs (omit for legacy behavior).
# - cross_zone_latency_ms is directed (caller_zone -> callee_zone) unless symmetric_cross_zone_latency: true,
#   in which case a missing forward edge can fall back to the reverse edge when present.
# - Precedence per downstream hop (non-external): same_host_latency_ms → same_zone_latency_ms (same zone,
#   different hosts) → directed cross-zone map / default_cross_zone_latency_ms.
# - kind: external uses external_latency_ms (scenario) or external_network_latency_ms (service override) and
#   does not require caller/callee zones for that overlay.
# network:
#   symmetric_cross_zone_latency: false
#   same_host_latency_ms: { mean: 0, sigma: 0 }
#   same_zone_latency_ms: { mean: 0, sigma: 0 }
#   default_cross_zone_latency_ms: { mean: 0, sigma: 0 }
#   external_latency_ms: { mean: 0, sigma: 0 }
#   cross_zone_latency_ms:
#     zone-a:
#       zone-b: { mean: 12, sigma: 2 }
#     zone-b:
#       zone-a: { mean: 15, sigma: 2 }

hosts:
  - id: host-1
    cores: 8
    memory_gb: 32
    zone: zone-a
    labels:
      rack: r1
      tier: edge
  - id: host-2
    cores: 8
    memory_gb: 32
    zone: zone-b
    labels:
      rack: r2
      tier: app
  - id: host-3
    cores: 8
    memory_gb: 32
    zone: zone-c
    labels:
      rack: r3
      tier: data

services:
  - id: api-gateway
    kind: api_gateway
    role: ingress
    replicas: 2
    model: cpu
    routing:
      # Default is round_robin; least_queue/least_connections are often more realistic for APIs.
      strategy: least_queue
      # Prefer serving requests from same-zone instances when caller metadata includes client_zone.
      # Runtime topology metrics now report locality hit/miss and same/cross-zone counters.
      locality_zone_from: client_zone
    cpu_cores: 1.0
    memory_mb: 768
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    endpoints:
      - path: /REST
        mean_cpu_ms: 4
        cpu_sigma_ms: 1
        default_memory_mb: 8
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream:
          - to: customer-core:/checkout
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 500
            call_latency_ms:
              mean: 3
              sigma: 1
          - to: analytics-core:/ingest
            mode: async
            kind: rest
            probability: 1
            call_count_mean: 0.25
            timeout_ms: 250
            call_latency_ms:
              mean: 2
              sigma: 0.5
          - to: messaging-queue:/events
            mode: async
            kind: queue
            probability: 1
            call_count_mean: 0.15
            timeout_ms: 400
            call_latency_ms:
              mean: 2
              sigma: 0.5

  - id: customer-core
    kind: service
    role: internal
    replicas: 3
    model: mixed
    cpu_cores: 1.5
    memory_mb: 1024
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    placement:
      required_zones: [zone-a, zone-b]
      preferred_zones: [zone-a]
      required_host_labels:
        tier: app
      spread_across_zones: true
      max_replicas_per_host: 1
    endpoints:
      - path: /checkout
        mean_cpu_ms: 12
        cpu_sigma_ms: 4
        default_memory_mb: 24
        net_latency_ms:
          mean: 3
          sigma: 1
        downstream:
          - to: profile:/lookup
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 300
            call_latency_ms:
              mean: 4
              sigma: 1
          - to: loyalty:/points
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 350
            call_latency_ms:
              mean: 5
              sigma: 1.5
          - to: messaging-queue:/notify
            mode: async
            kind: queue
            probability: 1
            call_count_mean: 0.4
            timeout_ms: 200
            call_latency_ms:
              mean: 3
              sigma: 1

  - id: messaging-queue
    # Point-to-point broker (kind: queue). For pub/sub with multiple independent
    # consumer groups, use kind: topic (see notifications-topic in this file).
    kind: queue
    role: internal
    replicas: 1
    model: cpu
    cpu_cores: 1.0
    memory_mb: 256
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    behavior:
      queue:
        capacity: 5000
        consumer_concurrency: 2
        consumer_target: "messaging:/process"
        delivery_latency_ms:
          mean: 2
          sigma: 0.5
        ack_timeout_ms: 8000
        max_redeliveries: 3
        drop_policy: reject
    endpoints:
      - path: /notify
        mean_cpu_ms: 1
        cpu_sigma_ms: 0.5
        default_memory_mb: 4
        net_latency_ms:
          mean: 1
          sigma: 0.3
        downstream: []
      - path: /events
        mean_cpu_ms: 1
        cpu_sigma_ms: 0.5
        default_memory_mb: 4
        net_latency_ms:
          mean: 1
          sigma: 0.3
        downstream: []
      - path: /user-events
        mean_cpu_ms: 1
        cpu_sigma_ms: 0.5
        default_memory_mb: 4
        net_latency_ms:
          mean: 1
          sigma: 0.3
        downstream: []

  # First-class pub/sub: fan-out per consumer group (distinct from point-to-point messaging-queue above).
  - id: notifications-topic
    kind: topic
    role: internal
    replicas: 1
    model: cpu
    cpu_cores: 0.5
    memory_mb: 256
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    behavior:
      topic:
        partitions: 3
        retention_ms: 600000
        capacity: 100000
        delivery_latency_ms:
          mean: 2
          sigma: 0.5
        publish_ack: leader_ack
        subscribers:
          - name: to-processor
            consumer_group: notif-processor
            consumer_target: "messaging:/process"
            consumer_concurrency: 4
            ack_timeout_ms: 8000
            max_redeliveries: 3
            drop_policy: reject
          - name: to-notify
            consumer_group: notif-sidecar
            consumer_target: "messaging:/notify"
            consumer_concurrency: 2
            ack_timeout_ms: 8000
            max_redeliveries: 3
            drop_policy: reject
    endpoints:
      - path: /broadcast
        mean_cpu_ms: 1
        cpu_sigma_ms: 0.5
        default_memory_mb: 4
        net_latency_ms:
          mean: 1
          sigma: 0.3
        downstream: []

  - id: profile
    kind: service
    role: internal
    replicas: 2
    model: mixed
    cpu_cores: 1.0
    memory_mb: 768
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    endpoints:
      - path: /lookup
        mean_cpu_ms: 8
        cpu_sigma_ms: 2
        default_memory_mb: 16
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream:
          - to: profile-db:/query
            mode: sync
            kind: db
            probability: 1
            call_count_mean: 1
            timeout_ms: 250
            call_latency_ms:
              mean: 4
              sigma: 1

  - id: loyalty
    kind: service
    role: internal
    replicas: 2
    model: mixed
    cpu_cores: 1.0
    memory_mb: 768
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    endpoints:
      - path: /points
        mean_cpu_ms: 10
        cpu_sigma_ms: 3
        default_memory_mb: 18
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream:
          - to: loyalty-db:/query
            mode: sync
            kind: db
            probability: 1
            call_count_mean: 1
            timeout_ms: 300
            call_latency_ms:
              mean: 6
              sigma: 2
          - to: recommendations:/rank
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 0.3
            timeout_ms: 400
            call_latency_ms:
              mean: 4
              sigma: 1

  - id: recommendations
    kind: service
    role: internal
    replicas: 2
    model: cpu
    cpu_cores: 1.0
    memory_mb: 1024
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    endpoints:
      - path: /rank
        mean_cpu_ms: 25
        cpu_sigma_ms: 8
        default_memory_mb: 32
        net_latency_ms:
          mean: 3
          sigma: 1
        downstream:
          - to: recommendations-db:/query
            mode: sync
            kind: db
            probability: 1
            call_count_mean: 1
            timeout_ms: 450
            call_latency_ms:
              mean: 7
              sigma: 2

  - id: analytics-core
    kind: service
    role: internal
    replicas: 2
    model: mixed
    cpu_cores: 1.0
    memory_mb: 1024
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    endpoints:
      - path: /ingest
        mean_cpu_ms: 18
        cpu_sigma_ms: 6
        default_memory_mb: 28
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream:
          # Upstream app-map example:
          #   analytics-core -> topic-1
          # can be transformed today as an async publish to this broker topic.
          - to: messaging-queue:/user-events
            mode: async
            kind: queue
            probability: 0.2
            call_count_mean: 1
            timeout_ms: 500
            downstream_fraction_cpu: 0.1
            call_latency_ms:
              mean: 2
              sigma: 0.5
          - to: notifications-topic:/broadcast
            mode: async
            kind: topic
            probability: 0.1
            call_count_mean: 1
            timeout_ms: 500
            downstream_fraction_cpu: 0.08
            # DES demo: all async publishes on this edge share one partition key → hotspot on one shard.
            partition_key: "hotspot-tenant-a"
            call_latency_ms:
              mean: 2
              sigma: 0.5

  - id: messaging
    kind: service
    role: internal
    replicas: 1
    model: mixed
    cpu_cores: 1.0
    memory_mb: 512
    scaling:
      horizontal: true
      vertical_cpu: true
      vertical_memory: true
    placement:
      required_host_labels:
        rack: r2
      preferred_zones: [zone-b]
    endpoints:
      - path: /notify
        mean_cpu_ms: 14
        cpu_sigma_ms: 4
        default_memory_mb: 20
        net_latency_ms:
          mean: 4
          sigma: 1
        downstream: []
      - path: /process
        mean_cpu_ms: 14
        cpu_sigma_ms: 4
        default_memory_mb: 20
        net_latency_ms:
          mean: 4
          sigma: 1
        downstream: []

  - id: profile-db
    kind: database
    role: datastore
    replicas: 1
    model: db_latency
    cpu_cores: 2.0
    memory_mb: 4096
    scaling:
      horizontal: false
      vertical_cpu: true
      vertical_memory: true
    placement:
      required_zones: [zone-c]
      required_host_labels:
        tier: data
    endpoints:
      - path: /query
        mean_cpu_ms: 3
        cpu_sigma_ms: 1
        default_memory_mb: 12
        net_latency_ms:
          mean: 6
          sigma: 1.5
        downstream: []

  - id: loyalty-db
    kind: database
    role: datastore
    replicas: 1
    model: db_latency
    cpu_cores: 2.0
    memory_mb: 4096
    scaling:
      horizontal: false
      vertical_cpu: true
      vertical_memory: true
    placement:
      required_zones: [zone-c]
    endpoints:
      - path: /query
        mean_cpu_ms: 4
        cpu_sigma_ms: 1
        default_memory_mb: 16
        net_latency_ms:
          mean: 8
          sigma: 2
        downstream: []

  - id: recommendations-db
    kind: database
    role: datastore
    replicas: 1
    model: db_latency
    cpu_cores: 2.0
    memory_mb: 4096
    scaling:
      horizontal: false
      vertical_cpu: true
      vertical_memory: true
    placement:
      required_zones: [zone-c]
    endpoints:
      - path: /query
        mean_cpu_ms: 5
        cpu_sigma_ms: 1.5
        default_memory_mb: 18
        net_latency_ms:
          mean: 10
          sigma: 3
        downstream: []

  # --- Optional v2 behavior examples (not on the default hot path unless wired into edges above) ---
  - id: demo-payments-external
    kind: external
    role: internal
    replicas: 1
    model: cpu
    behavior:
      failure_rate: 0.001
      max_connections: 16
    endpoints:
      - path: /charge
        mean_cpu_ms: 2
        cpu_sigma_ms: 0.5
        default_memory_mb: 8
        net_latency_ms:
          mean: 25
          sigma: 8
        downstream: []

  - id: demo-orders-db
    kind: database
    role: datastore
    replicas: 1
    model: db_latency
    behavior:
      max_connections: 4
    cpu_cores: 2.0
    memory_mb: 4096
    scaling:
      horizontal: false
      vertical_cpu: true
      vertical_memory: true
    endpoints:
      - path: /orders
        mean_cpu_ms: 4
        cpu_sigma_ms: 1
        default_memory_mb: 24
        io_ms:
          mean: 6
          sigma: 2
        connection_pool: 4
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream: []

  - id: demo-product-cache
    kind: cache
    role: internal
    replicas: 2
    model: cpu
    behavior:
      cache:
        hit_rate: 0.78
        hit_latency_ms:
          mean: 1.2
          sigma: 0.3
        miss_latency_ms:
          mean: 8
          sigma: 2
    endpoints:
      - path: /product
        mean_cpu_ms: 3
        cpu_sigma_ms: 1
        default_memory_mb: 32
        net_latency_ms:
          mean: 1
          sigma: 0.3
        downstream: []

workload:
  # NOTE: same_zone_request_count / cross_zone_request_count are also emitted for downstream
  # calls by comparing caller host zone to selected callee host zone.
  - from: web-client
    source_kind: client
    traffic_class: ingress
    metadata:
      client_zone: zone-a
    to: api-gateway:/REST
    arrival:
      type: poisson
      rate_rps: 80
  - from: mobile-client
    source_kind: client
    traffic_class: ingress
    metadata:
      client_zone: zone-b
    to: api-gateway:/REST
    arrival:
      type: bursty
      rate_rps: 20
      burst_rate_rps: 80
      burst_duration_seconds: 10
      quiet_duration_seconds: 30
  - from: analytics-replay
    source_kind: batch_job
    traffic_class: background
    to: analytics-core:/ingest
    arrival:
      type: constant
      rate_rps: 5

policies:
  autoscaling:
    enabled: true
    target_cpu_util: 0.65
    scale_step: 1
  retries:
    enabled: true
    max_retries: 2
    backoff: exponential
    base_ms: 50
