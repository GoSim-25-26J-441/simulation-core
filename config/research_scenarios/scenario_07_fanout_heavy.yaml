# Research purpose: High fan-out request graph for work-amplification and root latency analysis.
# Expected behavior: Total/internal request counts exceed ingress counts, with higher root tail latency than baseline.
metadata:
  schema_version: "0.2.0"

simulation_limits:
  max_trace_depth: 32
  max_async_hops: 8

hosts:
  - id: edge-a
    cores: 8
    memory_gb: 16
    zone: zone-a
  - id: app-a
    cores: 16
    memory_gb: 32
    zone: zone-a
  - id: app-b
    cores: 16
    memory_gb: 32
    zone: zone-b
  - id: data-a
    cores: 16
    memory_gb: 64
    zone: zone-a

services:
  - id: api-gateway
    kind: api_gateway
    role: ingress
    replicas: 2
    model: cpu
    cpu_cores: 1.0
    memory_mb: 768
    routing:
      strategy: least_queue
    endpoints:
      - path: /home
        mean_cpu_ms: 5
        cpu_sigma_ms: 1
        default_memory_mb: 10
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream:
          - to: profile-service:/lookup
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 250
            call_latency_ms:
              mean: 3
              sigma: 1
          - to: pricing-service:/quote
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 250
            call_latency_ms:
              mean: 4
              sigma: 1
          - to: inventory-service:/availability
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 300
            call_latency_ms:
              mean: 4
              sigma: 1
          - to: recommendation-service:/rank
            mode: sync
            kind: rest
            probability: 0.75
            call_count_mean: 1
            timeout_ms: 350
            call_latency_ms:
              mean: 5
              sigma: 2

  - id: profile-service
    kind: service
    role: internal
    replicas: 2
    model: cpu
    cpu_cores: 1.0
    memory_mb: 512
    endpoints:
      - path: /lookup
        mean_cpu_ms: 8
        cpu_sigma_ms: 2
        default_memory_mb: 12
        net_latency_ms:
          mean: 2
          sigma: 0.5

  - id: pricing-service
    kind: service
    role: internal
    replicas: 2
    model: mixed
    cpu_cores: 1.0
    memory_mb: 768
    endpoints:
      - path: /quote
        mean_cpu_ms: 13
        cpu_sigma_ms: 4
        default_memory_mb: 18
        net_latency_ms:
          mean: 3
          sigma: 1

  - id: inventory-service
    kind: service
    role: internal
    replicas: 2
    model: mixed
    cpu_cores: 1.0
    memory_mb: 768
    endpoints:
      - path: /availability
        mean_cpu_ms: 12
        cpu_sigma_ms: 4
        default_memory_mb: 18
        net_latency_ms:
          mean: 3
          sigma: 1

  - id: recommendation-service
    kind: service
    role: internal
    replicas: 2
    model: mixed
    cpu_cores: 1.25
    memory_mb: 1024
    endpoints:
      - path: /rank
        mean_cpu_ms: 20
        cpu_sigma_ms: 7
        default_memory_mb: 32
        net_latency_ms:
          mean: 5
          sigma: 2
        downstream:
          - to: recommendation-db:/features
            mode: sync
            kind: db
            probability: 1
            call_count_mean: 1
            timeout_ms: 300
            call_latency_ms:
              mean: 5
              sigma: 1

  - id: recommendation-db
    kind: database
    role: datastore
    replicas: 1
    model: db_latency
    cpu_cores: 2.0
    memory_mb: 4096
    endpoints:
      - path: /features
        mean_cpu_ms: 4
        cpu_sigma_ms: 1
        default_memory_mb: 24
        io_ms:
          mean: 16
          sigma: 4
        connection_pool: 48
        net_latency_ms:
          mean: 3
          sigma: 1

workload:
  - from: synthetic-client
    source_kind: client
    traffic_class: home
    to: api-gateway:/home
    arrival:
      type: constant
      rate_rps: 120
