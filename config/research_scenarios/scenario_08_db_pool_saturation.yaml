# Research purpose: Database connection-pool saturation and datastore wait modeling.
# Expected behavior: DB wait/processing latency and tail latency rise while ingress throughput remains near offered load.
metadata:
  schema_version: "0.2.0"

simulation_limits:
  max_trace_depth: 24
  max_async_hops: 8

hosts:
  - id: edge-a
    cores: 8
    memory_gb: 16
    zone: zone-a
  - id: app-a
    cores: 12
    memory_gb: 32
    zone: zone-a
  - id: app-b
    cores: 12
    memory_gb: 32
    zone: zone-b
  - id: data-a
    cores: 12
    memory_gb: 64
    zone: zone-a

services:
  - id: api-gateway
    kind: api_gateway
    role: ingress
    replicas: 2
    model: cpu
    cpu_cores: 1.0
    memory_mb: 768
    routing:
      strategy: least_queue
    endpoints:
      - path: /search
        mean_cpu_ms: 4
        cpu_sigma_ms: 1
        default_memory_mb: 8
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream:
          - to: search-service:/query
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 650
            call_latency_ms:
              mean: 3
              sigma: 1

  - id: search-service
    kind: service
    role: internal
    replicas: 3
    model: mixed
    cpu_cores: 1.0
    memory_mb: 1024
    routing:
      strategy: least_queue
    endpoints:
      - path: /query
        mean_cpu_ms: 12
        cpu_sigma_ms: 4
        default_memory_mb: 24
        net_latency_ms:
          mean: 3
          sigma: 1
        downstream:
          - to: catalog-db:/query
            mode: sync
            kind: db
            probability: 1
            call_count_mean: 1
            timeout_ms: 500
            call_latency_ms:
              mean: 5
              sigma: 1

  - id: catalog-db
    kind: database
    role: datastore
    replicas: 1
    model: db_latency
    cpu_cores: 1.5
    memory_mb: 4096
    endpoints:
      - path: /query
        mean_cpu_ms: 5
        cpu_sigma_ms: 1.5
        default_memory_mb: 28
        io_ms:
          mean: 30
          sigma: 8
        connection_pool: 12
        timeout_ms: 450
        net_latency_ms:
          mean: 3
          sigma: 1

workload:
  - from: synthetic-client
    source_kind: client
    traffic_class: search
    to: api-gateway:/search
    arrival:
      type: constant
      rate_rps: 120
