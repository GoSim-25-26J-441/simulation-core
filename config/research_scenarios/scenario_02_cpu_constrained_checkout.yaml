# Research purpose: Checkout path with intentionally tighter app/service CPU capacity.
# Expected behavior: Similar offered throughput to baseline but higher service CPU utilization, queue wait, and tail latency.
metadata:
  schema_version: "0.2.0"

simulation_limits:
  max_trace_depth: 24
  max_async_hops: 8

hosts:
  - id: edge-a
    cores: 8
    memory_gb: 16
    zone: zone-a
  - id: app-a
    cores: 8
    memory_gb: 24
    zone: zone-a
  - id: app-b
    cores: 8
    memory_gb: 24
    zone: zone-b
  - id: data-a
    cores: 12
    memory_gb: 64
    zone: zone-a

services:
  - id: api-gateway
    kind: api_gateway
    role: ingress
    replicas: 2
    model: cpu
    cpu_cores: 1.0
    memory_mb: 768
    routing:
      strategy: least_queue
    endpoints:
      - path: /checkout
        mean_cpu_ms: 4
        cpu_sigma_ms: 1
        default_memory_mb: 8
        net_latency_ms:
          mean: 2
          sigma: 0.5
        downstream:
          - to: checkout-core:/place-order
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 650
            call_latency_ms:
              mean: 3
              sigma: 1

  - id: checkout-core
    kind: service
    role: internal
    replicas: 2
    model: mixed
    cpu_cores: 0.75
    memory_mb: 1024
    routing:
      strategy: least_queue
    endpoints:
      - path: /place-order
        mean_cpu_ms: 24
        cpu_sigma_ms: 6
        default_memory_mb: 28
        net_latency_ms:
          mean: 3
          sigma: 1
        downstream:
          - to: profile-service:/lookup
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 350
            call_latency_ms:
              mean: 4
              sigma: 1
          - to: payment-service:/authorize
            mode: sync
            kind: rest
            probability: 1
            call_count_mean: 1
            timeout_ms: 400
            call_latency_ms:
              mean: 5
              sigma: 1.5
          - to: inventory-db:/reserve
            mode: sync
            kind: db
            probability: 1
            call_count_mean: 1
            timeout_ms: 400
            call_latency_ms:
              mean: 4
              sigma: 1

  - id: profile-service
    kind: service
    role: internal
    replicas: 2
    model: cpu
    cpu_cores: 1.0
    memory_mb: 512
    endpoints:
      - path: /lookup
        mean_cpu_ms: 7
        cpu_sigma_ms: 2
        default_memory_mb: 12
        net_latency_ms:
          mean: 2
          sigma: 0.5

  - id: payment-service
    kind: service
    role: internal
    replicas: 1
    model: mixed
    cpu_cores: 0.75
    memory_mb: 768
    endpoints:
      - path: /authorize
        mean_cpu_ms: 15
        cpu_sigma_ms: 4
        default_memory_mb: 18
        net_latency_ms:
          mean: 4
          sigma: 1

  - id: inventory-db
    kind: database
    role: datastore
    replicas: 1
    model: db_latency
    cpu_cores: 2.0
    memory_mb: 4096
    endpoints:
      - path: /reserve
        mean_cpu_ms: 4
        cpu_sigma_ms: 1
        default_memory_mb: 24
        io_ms:
          mean: 12
          sigma: 3
        connection_pool: 48
        net_latency_ms:
          mean: 3
          sigma: 1

workload:
  - from: synthetic-client
    source_kind: client
    traffic_class: checkout
    to: api-gateway:/checkout
    arrival:
      type: constant
      rate_rps: 120
