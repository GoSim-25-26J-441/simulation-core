name: CI

on:
  push:
    branches: [main, dev, ci]
  pull_request:
    branches: [main, dev, ci]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate protobuf stubs
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.62.1
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          "$(go env GOPATH)/bin/buf" generate

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...

  deploy:
    environment: production
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    concurrency:
      group: deploy-main
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate protobuf stubs
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.62.1
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          "$(go env GOPATH)/bin/buf" generate

      - name: Build Linux binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o simd ./cmd/simd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload binary to S3
        run: aws s3 cp simd s3://${{ secrets.DEPLOY_BUCKET }}/simulation-core/simd

      - name: Upload install and deploy scripts to S3
        run: |
          aws s3 cp scripts/install-simulation-core-service.sh s3://${{ secrets.DEPLOY_BUCKET }}/simulation-core/scripts/install-service.sh
          aws s3 cp scripts/ec2-deploy.sh s3://${{ secrets.DEPLOY_BUCKET }}/simulation-core/scripts/deploy.sh

      - name: Deploy via SSM Run Command (wait on command id)
        env:
          BUCKET: ${{ secrets.DEPLOY_BUCKET }}
          REGION: ${{ env.AWS_REGION }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          cmd="aws s3 cp s3://${BUCKET}/simulation-core/scripts/install-service.sh /tmp/install-service.sh --region ${REGION} && chmod +x /tmp/install-service.sh && aws s3 cp s3://${BUCKET}/simulation-core/scripts/deploy.sh /tmp/deploy.sh --region ${REGION} && chmod +x /tmp/deploy.sh && /tmp/install-service.sh && /tmp/deploy.sh ${BUCKET} ${REGION}"
          json_commands=$(echo -n "$cmd" | jq -Rs .)
          cmd_id=$(aws ssm send-command \
            --region "${REGION}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${INSTANCE_ID}" \
            --parameters "{\"commands\":[$json_commands]}" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM CommandId=${cmd_id}"
          bash scripts/wait-ssm-command.sh "${cmd_id}" "${INSTANCE_ID}" "${REGION}"
