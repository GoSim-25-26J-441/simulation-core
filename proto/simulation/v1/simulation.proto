syntax = "proto3";

package simulation.v1;

option go_package = "github.com/GoSim-25-26J-441/simulation-core/proto/simulation/v1;simulationv1";

// SimulationService is the gRPC "CLI plane" API exposed by simd.
//
// The CLI (simulator-cli) talks to simd over gRPC for interactive management.
// The backend can optionally also use this, but the orchestrator plane is HTTP.
service SimulationService {
  // CreateRun registers a run and stores its inputs (scenario/config).
  rpc CreateRun(CreateRunRequest) returns (CreateRunResponse);

  // StartRun starts executing a previously created run.
  rpc StartRun(StartRunRequest) returns (StartRunResponse);

  // StopRun requests a graceful stop/cancel of a running run.
  rpc StopRun(StopRunRequest) returns (StopRunResponse);

  // GetRun returns run status and summary metadata.
  rpc GetRun(GetRunRequest) returns (GetRunResponse);

  // ListRuns returns recent runs (best-effort; pagination optional).
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);

  // GetRunMetrics returns aggregated metrics for a completed (or running) run.
  rpc GetRunMetrics(GetRunMetricsRequest) returns (GetRunMetricsResponse);

  // StreamRunEvents streams lifecycle events for a run (status/metrics snapshots).
  rpc StreamRunEvents(StreamRunEventsRequest) returns (stream StreamRunEventsResponse);

  // UpdateWorkloadRate updates the request rate for a specific workload pattern in a running simulation.
  rpc UpdateWorkloadRate(UpdateWorkloadRateRequest) returns (UpdateWorkloadRateResponse);

  // UpdateRunConfiguration updates run configuration at runtime (e.g. service replicas).
  rpc UpdateRunConfiguration(UpdateRunConfigurationRequest) returns (UpdateRunConfigurationResponse);

  // GetRunConfiguration returns the current effective configuration for a running run.
  rpc GetRunConfiguration(GetRunConfigurationRequest) returns (GetRunConfigurationResponse);

  // RenewOnlineLease extends the wall-clock lease for a running online optimization run
  // when lease_ttl_ms is configured. Idempotent while the run is RUNNING.
  rpc RenewOnlineLease(RenewOnlineLeaseRequest) returns (RenewOnlineLeaseResponse);
}

// ---- Requests / responses

message CreateRunRequest {
  // Required.
  RunInput input = 1;

  // Optional. If set, server should use this as the run id (otherwise generate one).
  string run_id = 2;
}

message CreateRunResponse {
  Run run = 1;
}

message StartRunRequest {
  string run_id = 1;
}

message StartRunResponse {
  Run run = 1;
}

message StopRunRequest {
  string run_id = 1;
}

message StopRunResponse {
  Run run = 1;
}

message GetRunRequest {
  string run_id = 1;
}

message GetRunResponse {
  Run run = 1;
}

message ListRunsRequest {
  int32 limit = 1; // default server-side
}

message ListRunsResponse {
  repeated Run runs = 1;
}

message GetRunMetricsRequest {
  string run_id = 1;
}

message GetRunMetricsResponse {
  RunMetrics metrics = 1;
}

message StreamRunEventsRequest {
  string run_id = 1;

  // Optional: how often to emit metrics snapshots while running.
  int64 metrics_interval_ms = 2;
}

message StreamRunEventsResponse {
  RunEvent event = 1;
}

message UpdateWorkloadRateRequest {
  string run_id = 1;
  string pattern_key = 2;  // e.g., "client:svc1:/test"
  double rate_rps = 3;     // New rate in requests per second
}

message UpdateWorkloadRateResponse {
  Run run = 1;
}

message UpdateRunConfigurationRequest {
  string run_id = 1;
  repeated ServiceReplicasUpdate services = 2;  // e.g. { service_id: "auth", replicas: 5 }
}

message ServiceReplicasUpdate {
  string service_id = 1;
  int32 replicas = 2;
  // Optional vertical scaling parameters per service instance. When > 0, these
  // override the CPU cores and memory (MB) allocated to each instance of the
  // service in this run. When 0, the existing allocation is left unchanged.
  double cpu_cores = 3;
  double memory_mb = 4;
}

message UpdateRunConfigurationResponse {
  Run run = 1;
}

message GetRunConfigurationRequest {
  string run_id = 1;
}

message GetRunConfigurationResponse {
  RunConfiguration configuration = 1;
}

message RenewOnlineLeaseRequest {
  string run_id = 1;
}

message RenewOnlineLeaseResponse {
  Run run = 1;
}

message RunConfiguration {
  repeated ServiceConfigEntry services = 1;    // current replicas and per-instance resources per service
  repeated WorkloadPatternEntry workload = 2;  // current workload patterns (pattern_key, rate_rps)
  repeated HostConfigEntry hosts = 3;          // current host resource allocations (cores, memory)
  // Per-instance placement and live stats (sorted by host_id, then instance_id for stable UI ordering).
  repeated InstancePlacementEntry placements = 4;
}

message InstancePlacementEntry {
  string instance_id = 1;
  string service_id = 2;
  string host_id = 3;
  // ACTIVE or DRAINING
  string lifecycle = 4;
  double cpu_cores = 5;
  double memory_mb = 6;
  double cpu_utilization = 7;
  double memory_utilization = 8;
  int32 active_requests = 9;
  int32 queue_length = 10;
}

message ServiceConfigEntry {
  string service_id = 1;
  int32 replicas = 2;
  // Current per-instance CPU cores and memory (MB) for this service.
  double cpu_cores = 3;
  double memory_mb = 4;
}

message WorkloadPatternEntry {
  string pattern_key = 1;
  double rate_rps = 2;
}

message HostConfigEntry {
  string host_id = 1;
  int32 cpu_cores = 2;
  int32 memory_gb = 3;
}

// ---- Core models

message RunInput {
  // One of the following inputs should be provided.

  // Scenario YAML (the format used by config/scenario.yaml).
  string scenario_yaml = 1;

  // Optional additional config YAML (the format used by config/config.yaml).
  string config_yaml = 2;

  // Simulation duration override in milliseconds.
  // Clients should send a positive value to explicitly override the duration.
  // If 0 (the proto3 default) or unset at the client, the server uses scenario/config defaults.
  // Negative values are not valid and may be rejected by the server.
  int64 duration_ms = 3;

  // Deterministic seed (0 => server-generated).
  int64 seed = 4;

  // Real-time mode: if true, the simulation will throttle to run in real-time,
  // making it suitable for real-time dashboards and monitoring.
  // When false (default), the simulation runs as fast as possible.
  bool real_time_mode = 5;

  // When set, this run is an optimization experiment. The scenario_yaml is used
  // as the initial configuration; the orchestrator will run multiple simulations
  // to find a better configuration.
  OptimizationConfig optimization = 6;

  // Optional callback URL for completion notifications. When set, the server
  // POSTs run status to this URL on completion, failure, or cancellation.
  // Supports {run_id} placeholder (e.g. http://example.com/callback/{run_id}).
  string callback_url = 7;

  // Optional secret sent as X-Simulation-Callback-Secret header for callback auth.
  string callback_secret = 8;
}

// OptimizationConfig configures an optimization run (multi-run experiment).
message OptimizationConfig {
  // Objective function: p95_latency_ms, p99_latency_ms, mean_latency_ms,
  // throughput_rps, error_rate, cost, cpu_utilization, memory_utilization.
  string objective = 1;

  // Maximum optimization iterations (default 10).
  int32 max_iterations = 2;

  // Step size for parameter exploration (default 1.0).
  double step_size = 3;

  // Duration (in milliseconds) for each evaluation run in this optimization experiment.
  // If RunInput.duration_ms is 0 and this is > 0, the server uses this value as the
  // per-run simulation horizon for all candidate runs in the optimization.
  // If both are 0, the server falls back to a built-in default.
  int64 evaluation_duration_ms = 4;

  // When true, this optimization is an "online" controller that runs within a single
  // simulation run. The simulator adjusts configuration dynamically using the existing
  // dynamic configuration APIs. Wall-clock limits (max_online_duration_ms, lease, noop
  // convergence) are enforced server-side unless allow_unbounded_online is set.
  bool online = 5;

  // Target p95 latency in milliseconds for online optimization. When > 0, the
  // controller will attempt to keep the observed p95 latency at or below this
  // threshold by adjusting configuration (e.g., replicas) over time.
  double target_p95_latency_ms = 6;

  // Control interval in milliseconds for online optimization. When > 0, this
  // determines how often the controller reads metrics and attempts adjustments.
  // Defaults to 1000ms when unset.
  int64 control_interval_ms = 7;

  // Minimum and maximum number of hosts that the online controller is allowed
  // to use when performing host-level scaling. When max_hosts is greater than
  // the initial host count, the controller may scale out by adding hosts up to
  // this limit before switching to vertical host scaling. When min_hosts is
  // greater than 0, the controller will avoid scaling below this bound.
  int32 min_hosts = 8;
  int32 max_hosts = 9;

  // Optional. When > 0, online controller will scale down replicas only when
  // service CPU utilization is below this (0.0–1.0). Ignored if 0. Default 0
  // (current behavior: only check CPU < cpuHighThreshold).
  double scale_down_cpu_util_max = 10;
  // Optional. When > 0, online controller will scale down only when service
  // memory utilization is below this (0.0–1.0). Ignored if 0.
  double scale_down_mem_util_max = 11;

  // For online optimization: primary signal for scaling. Values: "p95_latency"
  // (default), "cpu_utilization", "memory_utilization". When cpu_utilization or
  // memory_utilization, scale-up when utilization > target_util_high, scale-down
  // when < target_util_low; P95 is used as guardrail (do not scale down if P95
  // would exceed target_p95_latency_ms).
  string optimization_target_primary = 12;
  // When optimization_target_primary is cpu_utilization or memory_utilization:
  // high threshold (0–1) for scale-up. Default 0.7.
  // For batch optimization with objective cpu_utilization or memory_utilization,
  // target_util_low and target_util_high define the desired utilization band (0–1);
  // the optimizer minimizes distance from this band (score 0 inside band).
  double target_util_high = 13;
  // When optimization_target_primary is cpu_utilization or memory_utilization:
  // low threshold (0–1) for scale-down. Default 0.4.
  // For batch optimization with objective cpu_utilization or memory_utilization,
  // see target_util_high: together they define the target utilization band.
  double target_util_low = 14;

  // When > 0, online controller may scale in hosts or decrease host capacity
  // only when max host CPU utilization is below this (0.0–1.0). Default 0 (disabled).
  double scale_down_host_cpu_util_max = 15;

  // Optional cap on total simulation runs for batch optimization. Each logical
  // candidate evaluation may execute multiple runs when reevaluations_per_candidate > 1;
  // all of those runs count toward this cap. When > 0, the optimizer stops once the
  // cap would be exceeded. When batch optimization is enabled (optimization.batch) and
  // this is 0, the server applies a default cap (64 simulation runs). Ignored for online
  // optimization. When 0 without batch, only max_iterations applies for hill-climbing.
  int32 max_evaluations = 16;

  // --- Scale-down policy (online controller) ---
  // Hard lower bounds; the controller will not go below these when scaling down.
  int32 min_replicas_per_service = 17;
  double min_cpu_cores_per_instance = 18;
  double min_memory_mb_per_instance = 19;

  // Require this many consecutive control intervals with stable under-utilization
  // before a scale-down action (replica drain, vertical downsize, or host change).
  // When 0, a single interval is enough (legacy behavior).
  int64 scale_down_stabilization_window_ms = 20;

  // Minimum wall-clock time between any two scale-up or scale-down actions.
  int64 scale_down_cooldown_ms = 21;

  // Simulation-time budget to drain a replica (no new traffic, wait for idle)
  // before force-removing it. When 0, defaults to 1h simulated time.
  int64 drain_timeout_ms = 22;

  // Optional headroom (MB) when decreasing per-instance memory: new limit must be
  // at least active_memory + headroom. When 0, a small default applies.
  double memory_downsize_headroom_mb = 23;

  // When > 0, host memory capacity may be decreased only if max host memory
  // utilization is below this (0–1). Pairs with scale_down_host_cpu_util_max.
  double scale_down_host_mem_util_max = 24;

  // Safety cap on online controller adjustment steps. When 0, the server derives
  // ceil(max_online_duration_ms / control_interval_ms) after applying defaults and caps.
  int32 max_controller_steps = 25;

  // Wall-clock maximum duration for an online run (milliseconds). When 0 and
  // allow_unbounded_online is false, the server applies a default (e.g. 10m) and
  // hard-caps to server_max_online_duration. When allow_unbounded_online is true,
  // 0 means no wall-clock duration limit from this field.
  int64 max_online_duration_ms = 26;

  // When true, allows max_online_duration_ms == 0 with max_controller_steps == 0
  // (no derived step cap) and skips mandatory lease for long runs. Use only when
  // the client will explicitly stop the run.
  bool allow_unbounded_online = 27;

  // Stop the online run after this many consecutive control intervals with no
  // configuration change (converged). When 0, the server applies a default based
  // on control_interval_ms (at least 20 intervals and ~60s of wall time at the
  // control cadence). Set to -1 to disable convergence-based stop.
  int32 max_noop_intervals = 28;

  // Wall-clock lease period (milliseconds) for heartbeat renewal. Required when
  // effective max_online_duration_ms exceeds the server's heartbeat threshold (e.g. 10m)
  // unless allow_unbounded_online is true. When > 0, the client must call RenewOnlineLease
  // before each lease expires or the run completes with online_completion_reason=heartbeat_expired.
  int64 lease_ttl_ms = 29;

  // When set and online=false, batch beam-search optimization is used instead of the legacy
  // hill-climbing loop. Legacy objective/step_size/max_iterations still accepted for compatibility.
  BatchOptimizationConfig batch = 30;
}

// ---- Batch optimization (offline multi-eval recommendation engine)

enum BatchSearchStrategy {
  BATCH_SEARCH_STRATEGY_UNSPECIFIED = 0;
  BATCH_SEARCH_STRATEGY_BEAM = 1;
}

enum BatchScalingAction {
  BATCH_SCALING_ACTION_UNSPECIFIED = 0;
  SERVICE_SCALE_OUT = 1;
  SERVICE_SCALE_IN = 2;
  SERVICE_SCALE_UP_CPU = 3;
  SERVICE_SCALE_DOWN_CPU = 4;
  SERVICE_SCALE_UP_MEMORY = 5;
  SERVICE_SCALE_DOWN_MEMORY = 6;
  HOST_SCALE_OUT = 7;
  HOST_SCALE_IN = 8;
  HOST_SCALE_UP_CPU = 9;
  HOST_SCALE_DOWN_CPU = 10;
  HOST_SCALE_UP_MEMORY = 11;
  HOST_SCALE_DOWN_MEMORY = 12;
}

message UtilizationBand {
  double low = 1;
  double high = 2;
}

message BatchStepSizes {
  int32 replica_step = 1;
  double service_cpu_ratio = 2;
  double service_memory_ratio = 3;
  int32 host_count_step = 4;
  int32 host_cpu_step_cores = 5;
  int32 host_memory_step_gb = 6;
}

message BatchCostWeights {
  double service_cpu = 1;
  double service_memory_gb = 2;
  double replicas = 3;
  double hosts = 4;
  double host_cpu = 5;
  double host_memory_gb = 6;
  double churn = 7;
}

message BatchPenaltyWeights {
  double p95 = 1;
  double p99 = 2;
  double error_rate = 3;
  double throughput = 4;
  double service_cpu_balance = 5;
  double service_memory_balance = 6;
  double host_cpu_balance = 7;
  double host_memory_balance = 8;
}

message BatchOptimizationConfig {
  BatchSearchStrategy search_strategy = 1;
  repeated BatchScalingAction allowed_actions = 2;
  optional bool freeze_workload = 3;
  optional bool freeze_policies = 4;
  double max_p95_latency_ms = 5;
  double max_p99_latency_ms = 6;
  double max_error_rate = 7;
  double min_throughput_rps = 8;
  UtilizationBand service_cpu_utilization_band = 9;
  UtilizationBand service_memory_utilization_band = 10;
  UtilizationBand host_cpu_utilization_band = 11;
  UtilizationBand host_memory_utilization_band = 12;
  int32 min_hosts = 13;
  int32 max_hosts = 14;
  int32 min_replicas_per_service = 15;
  int32 max_replicas_per_service = 16;
  double min_cpu_cores_per_instance = 17;
  double max_cpu_cores_per_instance = 18;
  double min_memory_mb_per_instance = 19;
  double max_memory_mb_per_instance = 20;
  int32 min_host_cpu_cores = 21;
  int32 max_host_cpu_cores = 22;
  int32 min_host_memory_gb = 23;
  int32 max_host_memory_gb = 24;
  BatchStepSizes step_sizes = 25;
  int32 beam_width = 26;
  int32 max_search_depth = 27;
  int32 max_neighbors_per_state = 28;
  int32 reevaluations_per_candidate = 29;
  int32 infeasible_beam_width = 30;
  BatchCostWeights cost_weights = 31;
  BatchPenaltyWeights penalty_weights = 32;
  // Optional: when unset, server defaults apply (local refinement on; deterministic seeds on).
  optional bool enable_local_refinement = 33;
  optional bool deterministic_candidate_seeds = 34;
}

message Run {
  string id = 1;
  RunStatus status = 2;

  // Unix epoch milliseconds (UTC).
  int64 created_at_unix_ms = 3;
  int64 started_at_unix_ms = 4;
  int64 ended_at_unix_ms = 5;

  string error = 6;

  // For optimization runs: the best run ID and score found.
  string best_run_id = 7;
  // For batch optimization, best_score remains a legacy compatibility scalar containing efficiency only; clients should use batch_recommendation_feasible, batch_violation_score, batch_efficiency_score, and batch_recommendation_summary for the full result.
  // For non-batch (hill-climbing) optimization, best_score is the objective value for the best configuration.
  double best_score = 8;
  int32 iterations = 9;

  // For optimization runs: run IDs of candidate configurations (from the optimizer).
  // When SIMD_OPTIMIZATION_TOP_CANDIDATES is set to N, only the top N by score are included (best run always included).
  repeated string candidate_run_ids = 10;

  // When status is RUN_STATUS_COMPLETED for an online run stopped by server limits,
  // identifies why: duration_limit, controller_steps_limit, converged, heartbeat_expired.
  string online_completion_reason = 11;

  // Batch optimization (offline): feasibility and structured scores for the recommended config.
  bool batch_recommendation_feasible = 12;
  double batch_violation_score = 13;
  double batch_efficiency_score = 14;
  // Human-readable summary (e.g. infeasible set empty, least-violating chosen).
  string batch_recommendation_summary = 15;
}

enum RunStatus {
  RUN_STATUS_UNSPECIFIED = 0;
  RUN_STATUS_PENDING = 1;
  RUN_STATUS_RUNNING = 2;
  RUN_STATUS_COMPLETED = 3;
  RUN_STATUS_FAILED = 4;
  RUN_STATUS_CANCELLED = 5;
  RUN_STATUS_STOPPED = 6;
}

message RunMetrics {
  int64 total_requests = 1;
  int64 successful_requests = 2;
  int64 failed_requests = 3;

  double latency_p50_ms = 4;
  double latency_p95_ms = 5;
  double latency_p99_ms = 6;
  double latency_mean_ms = 7;

  double throughput_rps = 8;

  // Ingress-side counts and RPS (external arrivals). Aggregate total_requests / throughput_rps include downstream hops.
  int64 ingress_requests = 11;
  int64 internal_requests = 12;
  double ingress_throughput_rps = 13;

  // User-visible ingress/root logical failures (one per failed external trace).
  int64 ingress_failed_requests = 14;
  // ingress_failed_requests / ingress_requests when ingress_requests > 0.
  double ingress_error_rate = 15;
  // Sum of request_error_count samples (attempt-level, includes internal retries).
  int64 attempt_failed_requests = 16;
  // attempt_failed_requests / total_requests when total_requests > 0.
  double attempt_error_rate = 17;
  int64 retry_attempts = 18;
  int64 timeout_errors = 19;

  repeated ServiceMetrics service_metrics = 9;
  // Per-host utilization when the simulator records host-level CPU/memory gauges.
  repeated HostMetrics host_metrics = 10;
}

message HostMetrics {
  string host_id = 1;
  double cpu_utilization = 2;
  double memory_utilization = 3;
}

message ServiceMetrics {
  string service_name = 1;
  int64 request_count = 2;
  int64 error_count = 3;

  double latency_p50_ms = 4;
  double latency_p95_ms = 5;
  double latency_p99_ms = 6;
  double latency_mean_ms = 7;

  double cpu_utilization = 8;
  double memory_utilization = 9;
  int32 active_replicas = 10;
  int32 concurrent_requests = 11;
  // Sum of latest queue_length gauge per instance (current state, not time-averaged).
  int32 queue_length = 12;
  // Queue wait (DES ArrivalTime → StartTime) percentiles/mean for this service (all endpoints).
  double queue_wait_p50_ms = 13;
  double queue_wait_p95_ms = 14;
  double queue_wait_p99_ms = 15;
  double queue_wait_mean_ms = 16;
  // Processing latency (StartTime → completion, CPU + net for the hop).
  double processing_latency_p50_ms = 17;
  double processing_latency_p95_ms = 18;
  double processing_latency_p99_ms = 19;
  double processing_latency_mean_ms = 20;
}

message RunEvent {
  // Unix epoch milliseconds (UTC).
  int64 at_unix_ms = 1;
  string run_id = 2;

  oneof event {
    RunStatusChanged status_changed = 3;
    MetricsSnapshot metrics_snapshot = 4;
    OptimizationProgress optimization_progress = 5;
    OptimizationStep optimization_step = 6;
  }
}

message RunStatusChanged {
  RunStatus previous = 1;
  RunStatus current = 2;
}

message MetricsSnapshot {
  RunMetrics metrics = 1;
}

// OptimizationProgress is emitted during optimization runs when iteration or best score changes.
message OptimizationProgress {
  int32 iteration = 1;
  double best_score = 2;
  string best_run_id = 3;
  // What best_score represents: e.g. "p95_latency", "cpu_utilization", "memory_utilization".
  string objective = 4;
  // Unit for best_score: e.g. "ms" for latency, "ratio" for utilization (0-1).
  string unit = 5;
}

// OptimizationStep is emitted when the online controller applies a configuration change.
// Backend can append to run.metadata.optimization_history for audit and replay.
message OptimizationStep {
  int32 iteration_index = 1;
  double target_p95_ms = 2;
  double score_p95_ms = 3;
  string reason = 4;
  RunConfiguration previous_config = 5;
  RunConfiguration current_config = 6;
}


